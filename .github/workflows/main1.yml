name: Copy Plugin and Push

on:
  workflow_dispatch:

jobs:
  copy-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Copy Plugin to Plugins Folder
        run: |
          cp connect-spigot.jar plugins/

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add plugins/connect-spigot.jar
          git commit -m "Copy connect-spigot plugin to plugins folder" || true
          git push
