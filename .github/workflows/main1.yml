name: Download Paper Jar

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download file
        run: |
          wget  https://github.com/minekube/connect-java/releases/download/latest/connect-spigot.jar

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "add jar"
          git push
