name: Minecraft Server

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"  # har 5 ghante run hoga

permissions:
  contents: write

jobs:
  mc:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Restore Repo
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install & Start Tailscale
        run: |
          # Install Tailscale
          curl -fsSL https://tailscale.com/install.sh | sh
          # Start Tailscale with persistent machine key
          sudo tailscale up --authkey ${{ secrets.TS_AUTH_KEY }} --hostname github-mc-server --accept-routes

      - name: Download PaperMC
        run: |
          wget https://fill-data.papermc.io/v1/objects/da497e12b43e5b61c5df150e4bfd0de0f53043e57d2ac98dd59289ee9da4ad68/paper-1.21.11-127.jar -O server.jar

      - name: Start Auto Backup Loop
        run: |
          (
            while true
            do
              sleep 300
              git config user.name "github-actions"
              git config user.email "actions@github.com"
              git add -A
              git commit -m "Auto backup" || true
              git push || true
            done
          ) &

      - name: Start Minecraft Server
        run: |
          java -Xmx16G -Xms4G -jar server.jar --nogui

      - name: Final Backup
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Final backup" || true
          git push || true
